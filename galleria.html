  <style>
    :root{--bg:#0d0d0f;--card:#16161a;--blue:#1E3A8A;--sky:#38BDF8;--gold:#D4AF37;--silver:#9ca3af;--white:#f1f5f9;--border:rgba(56,189,248,.15);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;font-size:18px;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    nav{position:fixed;top:0;inset-inline:0;z-index:99;background:rgba(13,13,15,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:72px;}
    .nav-brand{display:flex;align-items:center;gap:10px;}
    .nav-brand img.nav-logo{height:56px;width:auto;}
    .nav-brand img.nav-scritta{height:56px;width:auto;}
    .nav-links{display:flex;gap:28px;font-size:1.2rem;color:var(--silver);}
    .nav-links a:hover{color:var(--sky);}
    .nav-right{display:flex;align-items:center;gap:14px;}
    .nav-cta{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:#000;padding:10px 24px;border-radius:3px;transition:background .2s;}
    .nav-cta:hover{background:var(--sky);}
    .lang-select{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--sky);border:1px solid var(--border);border-radius:3px;padding:8px 12px;cursor:pointer;outline:none;}
    .lang-select option{background:#16161a;color:var(--white);}
    .social-links{display:flex;align-items:center;gap:10px;}
    .social-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card);transition:all .2s;}
    .social-btn svg{width:22px;height:22px;fill:currentColor;}
    .social-btn.yt{color:#FF0000;border-color:rgba(255,0,0,.3);}
    .social-btn.yt:hover{background:rgba(255,0,0,.15);border-color:#FF0000;}
    .social-btn.fb{color:#1877F2;border-color:rgba(24,119,242,.3);}
    .social-btn.fb:hover{background:rgba(24,119,242,.15);border-color:#1877F2;}
    .page-header{padding:120px 32px 60px;max-width:1100px;margin:0 auto;border-bottom:1px solid var(--border);}
    .page-label{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--sky);margin-bottom:12px;}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(2.5rem,5vw,4rem);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;}
    .page-sub{color:var(--silver);font-weight:300;font-size:1.1rem;max-width:520px;}
    footer{border-top:1px solid var(--border);padding:30px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;max-width:1100px;margin:0 auto;}
    .f-brand{display:flex;align-items:center;gap:10px;}
    .f-brand img{height:32px;width:auto;}
    .f-copy{font-size:.85rem;color:var(--silver);}
    .f-copy span{color:var(--gold);}

    /* TABS */
    .gallery{max-width:1100px;margin:0 auto;padding:50px 32px 80px;}
    .tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:32px;}
    .tab-btn{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;background:transparent;color:var(--silver);border:1px solid var(--border);border-bottom:none;padding:12px 22px;border-radius:3px 3px 0 0;cursor:pointer;transition:all .18s;margin-bottom:-1px;}
    .tab-btn:hover{color:var(--white);border-color:rgba(56,189,248,.35);}
    .tab-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}

    /* GRID */
    .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
    .gal-thumb{position:relative;overflow:hidden;border-radius:6px;border:1px solid var(--border);cursor:pointer;aspect-ratio:4/3;background:#0d0d0f;transition:border-color .22s,transform .22s;}
    .gal-thumb:hover{border-color:rgba(56,189,248,.5);transform:translateY(-3px);}
    .gal-thumb img{width:100%;height:100%;object-fit:contain;display:block;padding:6px;transition:transform .35s;}
    .gal-thumb:hover img{transform:scale(1.04);}
    .gal-thumb__overlay{position:absolute;inset:0;background:rgba(13,13,15,.0);display:flex;align-items:center;justify-content:center;transition:background .2s;}
    .gal-thumb:hover .gal-thumb__overlay{background:rgba(13,13,15,.4);}
    .gal-thumb__icon{font-size:2rem;opacity:0;transition:opacity .2s;}
    .gal-thumb:hover .gal-thumb__icon{opacity:1;}

    /* EMPTY CATEGORY */
    .gal-empty{text-align:center;padding:80px 20px;border:1px dashed rgba(56,189,248,.25);border-radius:8px;background:var(--card);}
    .gal-empty__icon{font-size:3rem;margin-bottom:14px;opacity:.5;}
    .gal-empty__title{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sky);margin-bottom:8px;}
    .gal-empty__text{font-size:.95rem;color:var(--silver);}

    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox__img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px;}
    .lightbox__close{position:absolute;top:20px;right:28px;font-size:2.5rem;color:var(--silver);cursor:pointer;transition:color .2s;line-height:1;}
    .lightbox__close:hover{color:var(--white);}
    .lightbox__prev,.lightbox__next{position:absolute;top:50%;transform:translateY(-50%);font-size:2.5rem;color:var(--silver);cursor:pointer;padding:10px 20px;transition:color .2s;user-select:none;}
    .lightbox__prev{left:10px;}
    .lightbox__next{right:10px;}
    .lightbox__prev:hover,.lightbox__next:hover{color:var(--sky);}
    .lightbox__caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--silver);text-align:center;white-space:nowrap;}

    @media(max-width:768px){
      nav{padding:0 16px;}.nav-links{display:none;}
      .page-header,.gallery{padding-left:20px;padding-right:20px;}
      footer{padding:24px 20px;justify-content:center;text-align:center;}
      .tabs{gap:4px;}.tab-btn{padding:10px 14px;font-size:.85rem;letter-spacing:.1em;}
      .gal-grid{grid-template-columns:repeat(2,1fr);}
      .lightbox__prev{left:2px;}.lightbox__next{right:2px;}
    }

<script>
// ── IMAGES DATA ─────────────────────────────────────────────
var images = [
  // Locomotive
  {src:'gal-loco-badoni208-01.jpg', cat:'loco', cap:'Badoni 208 — Livrea Verde FS'},
  {src:'gal-loco-badoni208-02.jpg', cat:'loco', cap:'Badoni 208 — Verde invecchiato'},
  {src:'gal-loco-badoni208-03.jpg', cat:'loco', cap:'Badoni 208 — Modello 3D'},
  {src:'gal-loco-badoni208-04.jpg', cat:'loco', cap:'Badoni 208 — Livrea DSB'},
  {src:'gal-loco-badoni208-05.jpg', cat:'loco', cap:'Badoni 208 — Livrea FFJ'},
  // Carrozze & Vagoni
  {src:'gal-carro-rmms-01.jpg', cat:'carro', cap:'Carro Rmms — Livrea FS (siderurgico)'},
  {src:'gal-carro-rmms-02.jpg', cat:'carro', cap:'Carro Rmms — Modello 3D'},
  {src:'gal-carro-rmms-03.jpg', cat:'carro', cap:'Carro Rmms — Wireframe'},
  {src:'gal-carro-rmms-04.jpg', cat:'carro', cap:'Carro Rmms — Disegno tecnico'}
];

// ── STATE ───────────────────────────────────────────────────
var currentCat = 'all';
var current = 0;

// ── TAB FILTER ──────────────────────────────────────────────
var tabButtons = document.querySelectorAll('.tab-btn');
var thumbs = document.querySelectorAll('.gal-thumb');
var emptyEl = document.getElementById('galEmpty');
var gridEl = document.getElementById('galGrid');

tabButtons.forEach(function(btn){
  btn.addEventListener('click', function(){
    currentCat = btn.dataset.tab;
    tabButtons.forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');

    var visibleCount = 0;
    thumbs.forEach(function(el){
      var show = (currentCat === 'all' || el.dataset.cat === currentCat);
      el.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });

    // Mostra placeholder se categoria vuota
    if (visibleCount === 0) {
      gridEl.style.display = 'none';
      emptyEl.style.display = 'block';
    } else {
      gridEl.style.display = '';
      emptyEl.style.display = 'none';
    }
  });
});

// ── LIGHTBOX ────────────────────────────────────────────────
function getFilteredImages(){
  if (currentCat === 'all') return images.map(function(img,i){ return {img:img, idx:i}; });
  return images.map(function(img,i){ return {img:img, idx:i}; }).filter(function(o){ return o.img.cat === currentCat; });
}

function openLightbox(thumbEl){
  var realIdx = parseInt(thumbEl.dataset.idx, 10);
  current = realIdx;
  showLightbox();
}

function showLightbox(){
  var img = images[current];
  if (!img) return;
  document.getElementById('lightboxImg').src = img.src;
  document.getElementById('lightboxImg').alt = img.cap;
  document.getElementById('lightboxCaption').textContent = img.cap;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function moveLightbox(dir){
  // Naviga solo dentro le immagini della categoria corrente
  var filtered = getFilteredImages();
  if (filtered.length === 0) return;
  var pos = filtered.findIndex(function(o){ return o.idx === current; });
  if (pos === -1) pos = 0;
  pos = (pos + dir + filtered.length) % filtered.length;
  current = filtered[pos].idx;
  showLightbox();
}

document.addEventListener('keydown', function(e){
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') moveLightbox(1);
  if (e.key === 'ArrowLeft') moveLightbox(-1);
});

document.getElementById('lightbox').addEventListener('click', function(e){
  if (e.target === this) closeLightbox();
});

// ── i18n ────────────────────────────────────────────────────
var t = {
  it:{ nav_home:'Home', nav_cat:'Catalogo', nav_contact:'Contatti', nav_buy:'Acquista', label:'Screenshot & Render', title:'Galleria', sub:'Immagini e render sviluppate da SilverHive.', tab_all:'Tutti', tab_loco:'🚂 Locomotive', tab_carro:'🚃 Carrozze & Vagoni', tab_scen:'🏞️ Scenari', empty_title:'Contenuti in arrivo', empty_text:'Questa sezione è in preparazione. Torna presto per nuovi contenuti.' },
  en:{ nav_home:'Home', nav_cat:'Catalogue', nav_contact:'Contact', nav_buy:'Buy now', label:'Screenshots & Renders', title:'Gallery', sub:'Images and renders developed by SilverHive.', tab_all:'All', tab_loco:'🚂 Locomotives', tab_carro:'🚃 Coaches & Wagons', tab_scen:'🏞️ Scenarios', empty_title:'Coming soon', empty_text:'This section is being prepared. Come back soon for new content.' },
  de:{ nav_home:'Start', nav_cat:'Katalog', nav_contact:'Kontakt', nav_buy:'Kaufen', label:'Screenshots & Renders', title:'Galerie', sub:'Bilder und Renders von SilverHive.', tab_all:'Alle', tab_loco:'🚂 Lokomotiven', tab_carro:'🚃 Wagen', tab_scen:'🏞️ Szenarien', empty_title:'Demnächst verfügbar', empty_text:'Dieser Bereich wird vorbereitet. Schau bald wieder vorbei.' },
  fr:{ nav_home:'Accueil', nav_cat:'Catalogue', nav_contact:'Contact', nav_buy:'Acheter', label:'Screenshots & Rendus', title:'Galerie', sub:'Images et rendus développés par SilverHive.', tab_all:'Tous', tab_loco:'🚂 Locomotives', tab_carro:'🚃 Voitures & Wagons', tab_scen:'🏞️ Scénarios', empty_title:'Bientôt disponible', empty_text:'Cette section est en préparation. Revenez bientôt.' },
  es:{ nav_home:'Inicio', nav_cat:'Catálogo', nav_contact:'Contacto', nav_buy:'Comprar', label:'Capturas & Renders', title:'Galería', sub:'Imágenes y renders desarrollados por SilverHive.', tab_all:'Todos', tab_loco:'🚂 Locomotoras', tab_carro:'🚃 Coches & Vagones', tab_scen:'🏞️ Escenarios', empty_title:'Próximamente', empty_text:'Esta sección está en preparación. Vuelve pronto.' }
};
function applyLang(lang) {
  var d = t[lang]; if (!d) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (d[k] !== undefined) el.innerHTML = d[k];
  });
  document.documentElement.lang = lang;
  localStorage.setItem('sh_lang', lang);
}
var sel = document.getElementById('langSelect');
var saved = localStorage.getItem('sh_lang') || 'it';
sel.value = saved; applyLang(saved);
sel.addEventListener('change', function() { applyLang(this.value); });
</script>
