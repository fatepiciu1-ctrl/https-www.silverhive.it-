    :root{--bg:#0d0d0f;--card:#16161a;--blue:#1E3A8A;--sky:#38BDF8;--gold:#D4AF37;--silver:#9ca3af;--white:#f1f5f9;--border:rgba(56,189,248,.15);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;font-size:18px;overflow-x:hidden;}

    nav{position:fixed;top:0;inset-inline:0;z-index:99;background:rgba(13,13,15,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:72px;}

    .nav-links{display:flex;gap:28px;font-size:1.2rem;color:var(--silver);}
    .nav-links a:hover{color:var(--sky);}
    .nav-right{display:flex;align-items:center;gap:14px;}
    .nav-cta{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:#000;padding:10px 24px;border-radius:3px;transition:background .2s;}
    .nav-cta:hover{background:var(--sky);}
    .lang-select{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--sky);border:1px solid var(--border);border-radius:3px;padding:8px 12px;cursor:pointer;outline:none;}
    .lang-select option{background:#16161a;color:var(--white);}
    .social-links{display:flex;align-items:center;gap:10px;}
    .social-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card);transition:all .2s;}
    .social-btn svg{width:22px;height:22px;fill:currentColor;}
    .social-btn.yt{color:#FF0000;border-color:rgba(255,0,0,.3);}
    .social-btn.yt:hover{background:rgba(255,0,0,.15);border-color:#FF0000;}
    .social-btn.fb{color:#1877F2;border-color:rgba(24,119,242,.3);}
    .social-btn.fb:hover{background:rgba(24,119,242,.15);border-color:#1877F2;}
    .page-header{padding:120px 32px 60px;max-width:1100px;margin:0 auto;border-bottom:1px solid var(--border);}
    .page-label{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--sky);margin-bottom:12px;}

    .page-content{max-width:1100px;margin:0 auto;padding:80px 32px;min-height:40vh;display:flex;align-items:center;justify-content:center;}
    .coming-soon{text-align:center;border:1px solid var(--border);border-radius:8px;padding:80px 60px;background:var(--card);max-width:500px;width:100%;}
    .coming-soon__icon{font-size:3.5rem;margin-bottom:20px;}
    .coming-soon__title{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;text-transform:uppercase;color:var(--sky);margin-bottom:12px;}
    .coming-soon__text{color:var(--silver);font-size:1rem;line-height:1.7;}
    .btn-back{display:inline-flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sky);border:1px solid var(--border);padding:10px 22px;border-radius:3px;margin-top:28px;transition:background .2s,color .2s;}
    .btn-back:hover{background:var(--sky);color:#000;}
    footer{border-top:1px solid var(--border);padding:30px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;max-width:1100px;margin:0 auto;}
    .f-brand{display:flex;align-items:center;gap:10px;}
    .f-brand img{height:32px;width:auto;}
    .f-copy{font-size:.85rem;color:var(--silver);}
    .f-copy span{color:var(--gold);}
    /* GALLERY */
    .gallery{max-width:1100px;margin:0 auto;padding:60px 32px 80px;}
    .gal-section{margin-bottom:56px;}
    .gal-section-title{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sky);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .gal-thumb{position:relative;overflow:hidden;border-radius:6px;border:1px solid var(--border);cursor:pointer;aspect-ratio:4/3;background:#0d0d0f;transition:border-color .22s,transform .22s;}
    .gal-thumb:hover{border-color:rgba(56,189,248,.5);transform:translateY(-3px);}
    .gal-thumb img{width:100%;height:100%;object-fit:contain;display:block;padding:6px;transition:transform .35s;}
    .gal-thumb:hover img{transform:scale(1.04);}
    .gal-thumb__overlay{position:absolute;inset:0;background:rgba(13,13,15,.0);display:flex;align-items:center;justify-content:center;transition:background .2s;}
    .gal-thumb:hover .gal-thumb__overlay{background:rgba(13,13,15,.4);}
    .gal-thumb__icon{font-size:2rem;opacity:0;transition:opacity .2s;}
    .gal-thumb:hover .gal-thumb__icon{opacity:1;}
    /* LIGHTBOX */
    .lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox__img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px;}
    .lightbox__close{position:absolute;top:20px;right:28px;font-size:2.5rem;color:var(--silver);cursor:pointer;transition:color .2s;line-height:1;}
    .lightbox__close:hover{color:var(--white);}
    .lightbox__prev,.lightbox__next{position:absolute;top:50%;transform:translateY(-50%);font-size:2.5rem;color:var(--silver);cursor:pointer;padding:10px 20px;transition:color .2s;user-select:none;}
    .lightbox__prev{left:10px;}
    .lightbox__next{right:10px;}
    .lightbox__prev:hover,.lightbox__next:hover{color:var(--sky);}
    .lightbox__caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--silver);text-align:center;}
    @media(max-width:768px){.gallery{padding:40px 20px 60px;}.gal-grid{grid-template-columns:repeat(2,1fr);}.lightbox__prev{left:2px;}.lightbox__next{right:2px;}}

<script>
var images = [
  {src:'gal1.jpg', cap:'Badoni 208 — Livrea Verde FS'},
  {src:'gal2.jpg', cap:'Badoni 208 — Verde invecchiato'},
  {src:'gal3.jpg', cap:'Badoni 208 — Modello 3D'},
  {src:'gal4.jpg', cap:'Badoni 208 — Livrea DSB'},
  {src:'gal5.jpg', cap:'Badoni 208 — Livrea FFJ'}
];
var current = 0;

function openLightbox(idx) {
  current = idx;
  document.getElementById('lightboxImg').src = images[idx].src;
  document.getElementById('lightboxCaption').textContent = images[idx].cap;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function moveLightbox(dir) {
  current = (current + dir + images.length) % images.length;
  document.getElementById('lightboxImg').src = images[current].src;
  document.getElementById('lightboxCaption').textContent = images[current].cap;
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') moveLightbox(1);
  if (e.key === 'ArrowLeft') moveLightbox(-1);
});
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
var t = {
  it:{ nav_home:'Home', nav_cat:'Catalogo', nav_contact:'Contatti', nav_buy:'Acquista', label:'Screenshot & Render', title:'Galleria', sub:'Immagini e render sviluppate da SilverHive.', soon_title:'Contenuti in arrivo', soon_text:'Questa sezione è in preparazione. Torna presto per scoprire i nuovi contenuti di SilverHive.', back:'← Home' },
  en:{ nav_home:'Home', nav_cat:'Catalogue', nav_contact:'Contact', nav_buy:'Buy now', label:'Screenshots & Renders', title:'Gallery', sub:'Images and renders developed by SilverHive.', soon_title:'Coming soon', soon_text:'This section is being prepared. Come back soon to discover new SilverHive content.', back:'← Home' },
  de:{ nav_home:'Start', nav_cat:'Katalog', nav_contact:'Kontakt', nav_buy:'Kaufen', label:'Screenshots & Renders', title:'Galerie', sub:'Bilder und Renders von SilverHive.', soon_title:'Demnächst verfügbar', soon_text:'Dieser Bereich wird vorbereitet. Schau bald wieder vorbei.', back:'← Startseite' },
  fr:{ nav_home:'Accueil', nav_cat:'Catalogue', nav_contact:'Contact', nav_buy:'Acheter', label:'Screenshots & Rendus', title:'Galerie', sub:'Images et rendus développés par SilverHive.', soon_title:'Bientôt disponible', soon_text:'Cette section est en préparation. Revenez bientôt.', back:'← Accueil' },
  es:{ nav_home:'Inicio', nav_cat:'Catálogo', nav_contact:'Contacto', nav_buy:'Comprar', label:'Capturas & Renders', title:'Galería', sub:'Imágenes y renders desarrollados por SilverHive.', soon_title:'Próximamente', soon_text:'Esta sección está en preparación. Vuelve pronto.', back:'← Inicio' }
};
function applyLang(lang) {
  var d = t[lang]; if (!d) return;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (d[k] !== undefined) el.innerHTML = d[k];
  });
  document.documentElement.lang = lang;
  localStorage.setItem('sh_lang', lang);
}
var sel = document.getElementById('langSelect');
var saved = localStorage.getItem('sh_lang') || 'it';
sel.value = saved; applyLang(saved);
sel.addEventListener('change', function() { applyLang(this.value); });
</script>
